[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/aanvraag"
  to = "/.netlify/functions/aanvraag"
  status = 200

[[redirects]]
  from = "/api/aanvragen"
  to = "/.netlify/functions/aanvragen"
  status = 200

[[redirects]]
  from = "/api/planning"
  to = "/.netlify/functions/planning"
  status = 200

[[redirects]]
  from = "/api/capaciteit"
  to = "/.netlify/functions/capaciteit"
  status = 200

[[redirects]]
  from = "/api/afronden"
  to = "/.netlify/functions/afronden"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex"
    X-Robots-Tag = "noindex"
